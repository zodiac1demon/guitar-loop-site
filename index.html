<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Infinite Guitar</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:black;
      font-family:Arial, Helvetica, sans-serif;
      color:white;
    }

    /*
       MAIN SCREEN
    */

    #main{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      background:black;
    }

    /* FULLSCREEN IMAGE */

    #guitar-container{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    #guitar-img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      user-select:none;
      pointer-events:none;

      transition:
        transform 2.2s cubic-bezier(0.19, 1, 0.22, 1),
        filter 2s ease,
        opacity 1.8s ease;
    }

    /* INFINITE ZOOM EFFECT */

    #guitar-img.zooming{
      transform:scale(5.5);
      filter:blur(10px) brightness(1.15);
      opacity:0.8;
    }

    /* DARK ATMOSPHERIC OVERLAY */

    #overlay{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at center,
        rgba(255,255,255,0.02),
        rgba(0,0,0,0.45));
      pointer-events:none;
    }

    /* TITLE */

    #title{
      position:absolute;
      bottom:28px;
      right:35px;

      z-index:20;

      font-size:24px;
      font-weight:700;
      letter-spacing:3px;

      color:white;

      text-shadow:
        0 0 15px rgba(255,255,255,0.15),
        0 0 30px rgba(0,0,0,0.9);
    }

    /* 
       GUITAR STRINGS
    */

    .string{
      position:absolute;

      left:28%;
      width:44%;
      height:4px;

      background:
        linear-gradient(
          to right,
          rgba(255,255,255,0.1),
          rgba(255,255,255,0.55),
          rgba(255,255,255,0.1)
        );

      cursor:pointer;

      z-index:10;

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        background 0.2s ease;
    }

    .string:hover{
      transform:scaleY(1.8);

      background:
        linear-gradient(
          to right,
          rgba(255,255,180,0.3),
          rgba(255,255,120,1),
          rgba(255,255,180,0.3)
        );

      box-shadow:
        0 0 12px yellow,
        0 0 30px rgba(255,255,100,0.6);
    }

    /* STRING LABELS */

    .label{
      position:absolute;
      left:-34px;
      top:-12px;

      font-size:18px;
      font-weight:bold;

      color:white;

      text-shadow:
        0 0 8px black,
        0 0 20px black;

      pointer-events:none;
    }

    /* STRING POSITIONS */

    #string1{ top:34%; }
    #string2{ top:39%; }
    #string3{ top:44%; }
    #string4{ top:49%; }
    #string5{ top:54%; }
    #string6{ top:59%; }

    /* 
       VIDEO PAGE
    */

    #player{
      position:fixed;
      inset:0;

      background:black;

      display:none;

      overflow-y:auto;

      z-index:999;

      opacity:0;

      transition:opacity 1.2s ease;
    }

    #player.active{
      opacity:1;
    }

    #player-content{
      min-height:100vh;

      display:flex;
      flex-direction:column;
      align-items:center;

      padding:50px 20px 100px;
    }

    video{
      width:85%;
      max-width:1000px;

      border-radius:14px;

      box-shadow:
        0 0 40px rgba(255,255,255,0.08);

      margin-bottom:50px;

      background:black;
    }

    /* DESCRIPTION */

    .description{
      width:85%;
      max-width:900px;

      line-height:1.8;
    }

    .description h1{
      font-size:42px;
      margin-bottom:20px;
    }

    .description p{
      font-size:19px;
      opacity:0.92;
    }

    /* RETURN BUTTON */

    button{
      margin-top:45px;

      border:none;

      padding:15px 28px;

      border-radius:10px;

      background:white;
      color:black;

      font-size:15px;
      font-weight:bold;

      cursor:pointer;

      transition:0.25s ease;
    }

    button:hover{
      transform:scale(1.05);
    }

    /*
       MOBILE
    */

    @media(max-width:768px){

      .string{
        width:56%;
        left:21%;
      }

      .label{
        left:-25px;
        font-size:15px;
      }

      .description h1{
        font-size:30px;
      }

      .description p{
        font-size:17px;
      }

      #title{
        font-size:18px;
        right:20px;
      }
    }

  </style>
</head>

<body>

  <!--
       MAIN SCREEN
-->

  <div id="main">

    <div id="guitar-container">

      <img
        id="guitar-img"
        src="guitar-image.jpg"
        alt="Infinite Guitar"
      />

    </div>

    <div id="overlay"></div>

    <!-- STRINGS -->

    <div class="string"
         id="string1"
         data-video="video1.mp4"
         data-sound="lowE.mp3"
         data-title="Low E — Family"
         data-description="Family, roots, childhood memories, and home life.">
      <span class="label">E</span>
    </div>

    <div class="string"
         id="string2"
         data-video="video2.mp4"
         data-sound="A.mp3"
         data-title="A — Hustle"
         data-description="PLACEHOLDER: Hard work, college, goals, pressure, and ambition.">
      <span class="label">A</span>
    </div>

    <div class="string"
         id="string3"
         data-video="video3.mp4"
         data-sound="D.mp3"
         data-title="D — Creativity"
         data-description="PLACEHOLDER: Hobbies, balance, creativity, and self-expression.">
      <span class="label">D</span>
    </div>

    <div class="string"
         id="string4"
         data-video="video4.mp4"
         data-sound="G.mp3"
         data-title="G — Friendship"
         data-description="Wish - By Choi Yu Ree: This song encompasses relationships, friendship, and emotional connection. 
         I wish (not pun intended) to meet new people and form more friendships in the future - something that I can learn from through 
         experiences in high school. ">
      <span class="label">G</span>
    </div>

    <div class="string"
         id="string5"
         data-video="video5.mp4"
         data-sound="B.mp3"
         data-title="B — The Unknown"
         data-description=" Stairway to Heaven - By led Zeppelin: This song represents freedom, uncertainty, and the future. I don't know
         what kind of stairway i'll take, but I sure hope it'll be an interesting one (doesn't necessarily have to lead to heaven or anything).">
      <span class="label">B</span>
    </div>

    <div class="string"
         id="string6"
         data-video="video6.mp4"
         data-sound="highE.mp3"
         data-title="High E — Success"
         data-description=" Riptide - Vance Joy: A Ukelele song, but sounds good on guitar too in my opinion. It represents Success, 
         motivation, happiness, and achievement. All encompassed in a calming melody. ">
      <span class="label">e</span>
    </div>

    <!-- TITLE -->

    <div id="title">
      Infinite Guitar
    </div>

  </div>

  <!-- 
       VIDEO PLAYER
  -->

  <div id="player">

    <div id="player-content">

      <video id="video" controls></video>

      <div class="description">

        <h1 id="desc-title">
          Title
        </h1>

        <p id="desc-text">
          Description Placeholder
        </p>

        <button onclick="exitVideo()">
          Return to Guitar
        </button>

      </div>

    </div>

  </div>

  <script>

    const strings = document.querySelectorAll('.string');

    const guitarImg = document.getElementById('guitar-img');

    const main = document.getElementById('main');

    const player = document.getElementById('player');

    const video = document.getElementById('video');

    const descTitle = document.getElementById('desc-title');

    const descText = document.getElementById('desc-text');

    /* 
       HOVER SOUND COOLDOWN
    */

    const cooldowns = {};

    /* 
       STRING EVENTS
     */

    strings.forEach(string => {

      /* HOVER SOUND */

      string.addEventListener('mouseenter', () => {

        const sound = string.dataset.sound;

        if(!cooldowns[sound]){

          cooldowns[sound] = true;

          const audio = new Audio(sound);

          audio.volume = 0.55;

          audio.play();

          setTimeout(() => {
            cooldowns[sound] = false;
          }, 700);
        }
      });

      /* CLICK STRING */

      string.addEventListener('click', () => {

        const videoSrc = string.dataset.video;

        const title = string.dataset.title;

        const description = string.dataset.description;

        startInfiniteTransition(
          videoSrc,
          title,
          description
        );
      });
    });

    /* 
       INFINITE TRANSITION
     */

    function startInfiniteTransition(src, title, description){

      /* MASSIVE ZOOM */

      guitarImg.classList.add('zooming');

      /* WAIT FOR ZOOM */

      setTimeout(() => {

        main.style.display = 'none';

        player.style.display = 'block';

        setTimeout(() => {
          player.classList.add('active');
        }, 30);

        video.src = src;

        descTitle.textContent = title;

        descText.textContent = description;

        video.play();

        player.scrollTop = 0;

        video.onended = () => {
          exitVideo();
        };

      }, 1800);
    }

    /* 
       EXIT VIDEO
    */

    function exitVideo(){

      video.pause();

      video.currentTime = 0;

      player.classList.remove('active');

      setTimeout(() => {

        player.style.display = 'none';

        main.style.display = 'block';

        guitarImg.classList.remove('zooming');

      }, 700);
    }

  </script>

</body>
</html>
